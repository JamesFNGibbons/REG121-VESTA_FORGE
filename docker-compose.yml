# REG121 vector ingest — full environment runs in Docker.
# Default library mount: ./import_bin (copy of examples/component-library-starter).
# Override with: export HOST_COMPONENT_LIBRARY=/absolute/path/to/your/library
# or: ./121 library configure (writes .reg121/component_library_root; ./121 picks it up)

services:
  app:
    build: .
    image: reg121-app
    env_file:
      - .env
    environment:
      COMPONENT_LIBRARY_ROOT: /library
      REG121_REPO_ROOT: /app
      PYTHONPATH: /app
    volumes:
      - ${HOST_COMPONENT_LIBRARY:-./import_bin}:/library:ro
      - ./.reg121:/app/.reg121
    stdin_open: true
    tty: true
    working_dir: /app

  tool:
    build: .
    image: reg121-app
    environment:
      REG121_REPO_ROOT: /app
      PYTHONPATH: /app
    volumes:
      - ./.reg121:/app/.reg121
    stdin_open: true
    tty: true
    working_dir: /app
    command: ["python", "-m", "tools.ingest_components", "library", "configure"]
